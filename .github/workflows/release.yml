name: Auto Release Install ZIP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-package-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Create Blender install ZIP and release
        shell: bash
        run: |
          set -euo pipefail

          # -P prevents the add-on's top-level types.py from shadowing stdlib types.
          VERSION="$(python -P tools/build_release_zip.py --print-version)"
          BUILD_ID="$(date -u +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          RELEASE_TAG="v${VERSION}-${BUILD_ID}"
          RELEASE_TITLE="Pie Menu Editor Fork ${VERSION} (${BUILD_ID})"
          ZIP="_dist/pme${VERSION}_${BUILD_ID}.zip"

          python -P tools/build_release_zip.py --output "$ZIP"
          gh release create "$RELEASE_TAG" "$ZIP" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
